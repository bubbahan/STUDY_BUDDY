<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - StudyBuddy</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #4e73df;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #2e59d9;
        }

        .logout {
            cursor: pointer;
        }

        .main {
            margin-left: 220px;
            padding: 24px;
        }

        h2 {
            color: #4e73df;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #4e73df;
        }

        .prog-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .prog-section h3 {
            margin-top: 0;
            color: #4e73df;
        }

        .progress-bar-wrap {
            background: #eee;
            border-radius: 5px;
            height: 14px;
        }

        .progress-bar-fill {
            height: 14px;
            background: #4e73df;
            border-radius: 5px;
            transition: width 0.5s;
        }

        .stress-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        .stress-Low {
            background: #28a745;
        }

        .stress-Medium {
            background: #ffc107;
            color: #333;
        }

        .stress-High {
            background: #dc3545;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>📚 StudyBuddy</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="timetable.html">📅 Timetable</a>
        <a href="session.html">⏱ Study Session</a>
        <a href="alarm.html">⏰ Alarm</a>
        <a href="progress.html" class="active">📊 Progress</a>
        <a href="courses.html">📚 Courses</a>
        <a href="weak.html">⚠️ Weak Areas</a>
        <a href="gamification.html">🎮 Gamification</a>
        <a href="settings.html">⚙️ Settings</a>
        <a class="logout" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="main">
        <h2>📊 Your Progress</h2>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Study Hours</div>
                <div class="value" id="studyHours">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Sessions Done</div>
                <div class="value" id="sessions">—</div>
            </div>
            <div class="stat-card">
                <div class="label">🔥 Streak</div>
                <div class="value" id="streak">—</div>
            </div>
            <div class="stat-card">
                <div class="label">⭐ XP Earned</div>
                <div class="value" id="xp">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Level</div>
                <div class="value" id="level">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Stress Level</div>
                <div class="value" id="stress">—</div>
            </div>
        </div>

        <div class="prog-section">
            <h3>Exam Preparation</h3>
            <p id="prepLabel" style="font-size:14px; margin-bottom:6px;">0%</p>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="prepBar" style="width:0%"></div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        requireAuth();

        async function loadProgress() {
            const data = await getDashboardData();
            if (!data._ok) return;

            document.getElementById("studyHours").innerText = (data.total_study_hours ?? 0) + " hrs";
            document.getElementById("sessions").innerText = data.total_sessions ?? 0;
            document.getElementById("streak").innerText = (data.streak ?? 0) + " days";
            document.getElementById("xp").innerText = data.xp ?? 0;
            document.getElementById("level").innerText = data.level ?? 1;

            const stress = data.stress_level || "—";
            document.getElementById("stress").innerHTML =
                `<span class="stress-badge stress-${stress}">${stress}</span>`;

            const pct = Math.min(data.preparation_percent ?? 0, 100);
            document.getElementById("prepLabel").innerText = pct.toFixed(1) + "% prepared";
            document.getElementById("prepBar").style.width = pct + "%";
        }

        loadProgress();
    </script>

</body>

</html>
