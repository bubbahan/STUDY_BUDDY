<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyBuddy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #4e73df;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2e59d9;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: #4e73df;
            text-decoration: none;
            font-weight: bold;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>📚 StudyBuddy</h2>

        <form id="loginForm" onsubmit="event.preventDefault(); loginUser();">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="error" id="errorMsg"></div>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Validate token before trusting it (prevents stale-token redirect loops)
        (async function checkExistingSession() {
            const token = localStorage.getItem("token");
            if (!token) return; // No token → stay on login page

            try {
                const res = await fetch(`${BASE_URL}/api/analytics/dashboard`, {
                    headers: { "Authorization": "Bearer " + token }
                });
                if (res.ok) {
                    // Token is still valid → go to dashboard
                    window.location.href = "dashboard.html";
                } else {
                    // Token is stale → clear it and stay on login page
                    localStorage.clear();
                }
            } catch (e) {
                // Server unreachable → stay on login page (don't clear token)
            }
        })();
    </script>

</body>

</html>
