<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Alarm - StudyBuddy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            margin-bottom: 24px;
        }

        .page-header h2 {
            color: var(--primary);
            margin: 0;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 4px 0 0;
        }

        .alarm-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 900px;
        }

        @media (max-width: 860px) {
            .alarm-container {
                grid-template-columns: 1fr;
            }
        }

        .alarm-card {
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .clock-display {
            font-size: 56px;
            font-weight: 800;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
            text-shadow: 0 4px 12px rgba(78, 115, 223, 0.15);
        }

        .alarm-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        input[type="time"] {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 20px;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: #fafbff;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .btn-set {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(78, 115, 223, 0.3);
        }

        .btn-set:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(78, 115, 223, 0.4);
        }

        .sound-badge {
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-muted);
            padding: 6px 14px;
            background: #f0f4ff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .alarm-list-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .list-header {
            padding: 16px 24px;
            background: #f8f9fc;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-header h4 {
            margin: 0;
            color: var(--text);
            font-size: 14px;
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .alarms-scroll {
            max-height: 400px;
            overflow-y: auto;
        }

        .alarm-item {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f2f5;
        }

        .alarm-item:last-child {
            border-bottom: none;
        }

        .alarm-info h5 {
            margin: 0;
            font-size: 18px;
            color: var(--primary);
        }

        .alarm-info p {
            margin: 2px 0 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        .btn-remove {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #fff0f0;
            color: var(--danger);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-remove:hover {
            background: var(--danger);
            color: white;
        }

        .empty-alarms {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Animation when alarm fires */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .ringing {
            animation: pulse 0.5s infinite;
            color: var(--danger) !important;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>📚 StudyBuddy</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="timetable.html">📅 Timetable</a>
        <a href="session.html">⏱ Study Session</a>
        <a href="alarm.html" class="active">⏰ Alarm</a>
        <a href="progress.html">📊 Progress</a>
        <a href="courses.html">📚 My Subjects</a>
        <a href="weak.html">⚠️ Weak Areas</a>
        <a href="gamification.html">🎮 Gamification</a>
        <a href="ai_study.html">🤖 AI Assistant</a>
        <a href="settings.html">⚙️ Settings</a>
        <a class="logout" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="page-header animate-fade">
            <h2>⏰ Study Alarm</h2>
            <p>Stay on track with personalized reminders</p>
        </div>

        <div class="alarm-container">
            <!-- Set Alarm Card -->
            <div class="alarm-card animate-fade">
                <div class="clock-display" id="currentTime">--:--:--</div>

                <div class="alarm-form">
                    <div class="form-group">
                        <label>Target Time</label>
                        <input type="time" id="alarmTime">
                    </div>
                    <div class="form-group">
                        <label>Remainder Label</label>
                        <input type="text" id="alarmLabel" placeholder="e.g. Start Thermodynamics">
                    </div>
                    <button class="btn-set" onclick="setAlarm()">🔔 Set Alarm</button>

                    <div class="sound-badge">
                        <span>🔊 Active Sound:</span>
                        <strong id="activeSoundName">Default Bell</strong>
                    </div>
                </div>
                <div id="statusMsg" style="margin-top: 15px; font-size: 13px;"></div>
            </div>

            <!-- Active Alarms Card -->
            <div class="alarm-list-card animate-fade" style="animation-delay: 0.1s">
                <div class="list-header">
                    <h4>Active Reminders</h4>
                    <button class="btn-clear" onclick="clearAllAlarms()">Clear All</button>
                </div>
                <div class="alarms-scroll" id="alarmsList">
                    <div class="empty-alarms">No active alarms set.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        requireAuth();

        let alarms = JSON.parse(localStorage.getItem("studyAlarms") || "[]");
        let activeSound = "default";

        async function fetchSettings() {
            const data = await getProfile();
            if (data && data._ok) {
                activeSound = data.alarm_sound || "default";
                document.getElementById("activeSoundName").innerText = activeSound.charAt(0).toUpperCase() + activeSound.slice(1);
            }
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const clockEl = document.getElementById("currentTime");
            clockEl.innerText = `${h}:${m}:${s}`;

            const hm = `${h}:${m}`;
            let fired = false;

            alarms.forEach((a, idx) => {
                if (a.time === hm && !a.fired) {
                    a.fired = true;
                    fired = true;
                    clockEl.classList.add("ringing");

                    // Play actual sound using SoundManager
                    SoundManager.play(activeSound, true);

                    // Show stop button if it doesn't exist
                    if (!document.getElementById("stopAlarmBtn")) {
                        const stopBtn = document.createElement("button");
                        stopBtn.id = "stopAlarmBtn";
                        stopBtn.className = "btn-set";
                        stopBtn.style.background = "var(--danger)";
                        stopBtn.style.marginTop = "10px";
                        stopBtn.innerText = "🛑 Stop Alarm";
                        stopBtn.onclick = stopAlarm;
                        document.querySelector(".alarm-form").appendChild(stopBtn);
                    }

                    setTimeout(() => {
                        alert(`⏰ STUDY ALARM!\n\n${a.label || 'Time to study!'}`);
                    }, 100);
                }
            });

            if (fired) {
                localStorage.setItem("studyAlarms", JSON.stringify(alarms));
                renderAlarms();
            }
        }

        function stopAlarm() {
            const clockEl = document.getElementById("currentTime");
            clockEl.classList.remove("ringing");
            SoundManager.stop();
            const stopBtn = document.getElementById("stopAlarmBtn");
            if (stopBtn) stopBtn.remove();
        }

        setInterval(updateClock, 1000);
        updateClock();

        function setAlarm() {
            const time = document.getElementById("alarmTime").value;
            const label = document.getElementById("alarmLabel").value.trim();
            const msg = document.getElementById("statusMsg");

            if (!time) {
                msg.style.color = "var(--danger)";
                msg.innerText = "Please select a time.";
                return;
            }

            alarms.push({ time, label, fired: false });
            localStorage.setItem("studyAlarms", JSON.stringify(alarms));
            renderAlarms();

            msg.style.color = "var(--accent)";
            msg.innerText = "✅ Alarm set successfully!";
            document.getElementById("alarmTime").value = "";
            document.getElementById("alarmLabel").value = "";
            setTimeout(() => msg.innerText = "", 3000);
        }

        function removeAlarm(idx) {
            alarms.splice(idx, 1);
            localStorage.setItem("studyAlarms", JSON.stringify(alarms));
            renderAlarms();
        }

        function clearAllAlarms() {
            if (!confirm("Clear all alarms?")) return;
            alarms = [];
            localStorage.setItem("studyAlarms", JSON.stringify(alarms));
            renderAlarms();
        }

        function renderAlarms() {
            const container = document.getElementById("alarmsList");
            if (alarms.length === 0) {
                container.innerHTML = '<div class="empty-alarms">No active alarms set.</div>';
                return;
            }

            container.innerHTML = alarms.map((a, i) => `
                <div class="alarm-item">
                    <div class="alarm-info">
                        <h5>${a.time} ${a.fired ? '✅' : ''}</h5>
                        <p>${a.label || 'Study Session'}</p>
                    </div>
                    <button class="btn-remove" onclick="removeAlarm(${i})">✕</button>
                </div>
            `).join("");
        }

        fetchSettings();
        renderAlarms();
    </script>
</body>

</html>
