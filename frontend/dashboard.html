<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - StudyBuddy</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #4e73df;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #2e59d9;
        }

        /* Main */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
            color: #4e73df;
        }

        .timetable {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 15px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2e59d9;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>📚 StudyBuddy</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="timetable.html">Timetable</a>
    <a href="session.html">Study Session</a>
    <a href="progress.html">Progress</a>
    <a href="courses.html">Courses</a>
    <a href="settings.html">Settings</a>
    <a href="login.html">Logout</a>
</div>

<div class="main">

    <div class="header">
        <h2>Welcome, <span id="username">Student</span> 👋</h2>
        <p>Stay consistent and achieve your goals!</p>
    </div>

    <div class="cards">

        <div class="card">
            <h3>📅 Study Hours</h3>
            <p id="studyHours">0 hrs</p>
        </div>

        <div class="card">
            <h3>🔥 Streak</h3>
            <p id="streak">0 days</p>
        </div>

        <div class="card">
            <h3>⭐ XP</h3>
            <p id="xp">0</p>
        </div>

        <div class="card">
            <h3>📊 Progress</h3>
            <p id="progress">0%</p>
        </div>

    </div>

    <div class="timetable">
        <h3>Today's Plan</h3>
        <ul id="planList">
            <li>No plan yet</li>
        </ul>

        <button onclick="generatePlan()">Generate Plan</button>
    </div>

</div>

<script>
    const BASE_URL = "http://127.0.0.1:5000";

    async function loadDashboard() {
        try {
            const response = await fetch(`${BASE_URL}/dashboard`);
            const data = await response.json();

            document.getElementById("username").innerText = data.name;
            document.getElementById("studyHours").innerText = data.study_hours + " hrs";
            document.getElementById("streak").innerText = data.streak + " days";
            document.getElementById("xp").innerText = data.xp;
            document.getElementById("progress").innerText = data.progress + "%";

        } catch (error) {
            console.log("Error loading dashboard");
        }
    }

    async function generatePlan() {
        const response = await fetch(`${BASE_URL}/generate-plan`);
        const data = await response.json();

        const list = document.getElementById("planList");
        list.innerHTML = "";

        data.plan.forEach(item => {
            const li = document.createElement("li");
            li.innerText = item.subject + " - " + item.hours + " hrs";
            list.appendChild(li);
        });
    }

    loadDashboard();
</script>

</body>
</html>
