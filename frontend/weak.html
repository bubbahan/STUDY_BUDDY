<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weak Areas - StudyBuddy</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #4e73df;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #2e59d9;
        }

        .logout {
            cursor: pointer;
        }

        .main {
            margin-left: 220px;
            padding: 24px;
        }

        h2 {
            color: #4e73df;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .weak-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #dc3545;
        }

        .weak-card h3 {
            margin: 0 0 6px;
            color: #222;
        }

        .weak-card p {
            margin: 4px 0;
            font-size: 13px;
            color: #555;
        }

        .severity-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: white;
            font-weight: bold;
        }

        .severity-High {
            background: #dc3545;
        }

        .severity-Medium {
            background: #ffc107;
            color: #333;
        }

        .severity-Low {
            background: #28a745;
        }

        .empty {
            color: #888;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>📚 StudyBuddy</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="timetable.html">📅 Timetable</a>
        <a href="session.html">⏱ Study Session</a>
        <a href="alarm.html">⏰ Alarm</a>
        <a href="progress.html">📊 Progress</a>
        <a href="courses.html">📚 Courses</a>
        <a href="weak.html" class="active">⚠️ Weak Areas</a>
        <a href="gamification.html">🎮 Gamification</a>
        <a href="settings.html">⚙️ Settings</a>
        <a class="logout" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="main">
        <h2>⚠️ Weak Areas</h2>
        <p style="color:#555; margin-bottom:20px;">
            Subjects where your actual study time is significantly less than planned.
        </p>
        <div class="cards-grid" id="weakGrid">
            <p class="empty">Loading...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        requireAuth();

        async function loadWeakAreas() {
            const areas = await getWeakAreas();
            const grid = document.getElementById("weakGrid");

            if (!Array.isArray(areas) || areas.length === 0) {
                grid.innerHTML = '<p class="empty">🎉 Great job! No weak areas detected.</p>';
                return;
            }

            grid.innerHTML = areas.map(a => `
            <div class="weak-card">
                <h3>📖 ${a.subject}</h3>
                <p>Issue: ${a.issue_type}</p>
                <p>Severity: <span class="severity-badge severity-${a.severity}">${a.severity}</span></p>
            </div>
        `).join("");
        }

        loadWeakAreas();
    </script>

</body>

</html>
