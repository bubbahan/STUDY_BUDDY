<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - StudyBuddy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .timetable-day-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .day-header {
            background: #f8f9fc;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .day-header h3 {
            margin: 0;
            font-size: 14px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 12px 20px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 13.5px;
        }

        th {
            background: #fafbff;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>📚 StudyBuddy</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="timetable.html" class="active">📅 Timetable</a>
        <a href="session.html">⏱ Study Session</a>
        <a href="alarm.html">⏰ Alarm</a>
        <a href="progress.html">📊 Progress</a>
        <a href="courses.html">📚 My Subjects</a>
        <a href="weak.html">⚠️ Weak Areas</a>
        <a href="gamification.html">🎮 Gamification</a>
        <a href="ai_study.html">🤖 AI Assistant</a>
        <a href="settings.html">⚙️ Settings</a>
        <a class="logout" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="main">
        <div class="page-header animate-fade">
            <div>
                <h2 style="color:var(--primary);margin:0">📅 Standard Timetable</h2>
                <p style="color:var(--text-muted);font-size:14px;margin:4px 0 0">Algorithmic schedule based on subject
                    frequency & exam priority</p>
            </div>
            <div style="display:flex; align-items:center; gap: 15px;">
                <span id="msg" style="font-size:13px"></span>
                <button class="btn btn-primary" id="genBtn" onclick="generatePlan()" style="padding: 10px 20px;">
                    ✨ Generate New Plan
                </button>
            </div>
        </div>

        <div id="timetableContainer" class="animate-fade" style="animation-delay:0.1s">
            <div style="text-align:center; padding:40px; color:var(--text-muted)">Loading timetable...</div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        requireAuth();

        async function loadTimetable() {
            const container = document.getElementById("timetableContainer");
            try {
                const data = await getTimetable();

                if (!data || !data._ok) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div style="font-size:48px; margin-bottom:15px">❌</div>
                            <h3>Connection Error</h3>
                            <p style="color:var(--text-muted); max-width:400px; margin:10px auto">
                                ${(data && data.message) ? data.message : "Could not connect to the study server. Ensure the backend is running."}
                            </p>
                        </div>`;
                    return;
                }

                // Backend returns { "YYYY-MM-DD": [ {subject, planned_hours...}, ... ], ... }
                // Filter keys that are actual dates
                const dates = Object.keys(data).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort();

                if (dates.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div style="font-size:48px; margin-bottom:15px">📅</div>
                            <h3>No Timetable Found</h3>
                            <p style="color:var(--text-muted); max-width:400px; margin:10px auto">
                                Click the button above to generate a smart study plan based on your subjects and exam dates.
                            </p>
                        </div>`;
                    return;
                }

                let html = "";
                dates.forEach(dateStr => {
                    const entries = data[dateStr];
                    const cleanDate = new Date(dateStr).toLocaleDateString(undefined, {
                        weekday: 'long',
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    html += `
                    <div class="timetable-day-card">
                        <div class="day-header">
                            <span style="font-size:18px">📌</span>
                            <h3>${cleanDate}</h3>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Subject</th>
                                    <th>Planned Hours</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${entries.map(e => `
                                    <tr>
                                        <td style="font-weight:600; color:var(--primary)">${e.subject}</td>
                                        <td>${e.planned_hours} hours</td>
                                        <td>
                                            <span class="badge ${e.completed ? 'badge-success' : 'badge-primary'}">
                                                ${e.completed ? 'Completed' : 'Planned'}
                                            </span>
                                        </td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>`;
                });

                container.innerHTML = html;
            } catch (err) {
                console.error("Timetable logic error:", err);
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:48px; margin-bottom:15px">⚠️</div>
                        <h3>Application Error</h3>
                        <p style="color:var(--text-muted); max-width:400px; margin:10px auto">
                            A script error occurred while loading your timetable. Check the browser console for details.
                        </p>
                    </div>`;
            }
        }

        async function generatePlan() {
            const btn = document.getElementById("genBtn");
            const msg = document.getElementById("msg");
            btn.disabled = true;
            msg.style.color = "var(--text)";
            msg.innerText = "Generating schedule...";

            const res = await generateTimetable();
            if (res._ok) {
                msg.style.color = "var(--accent)";
                msg.innerText = "✅ " + (res.message || "Generated!");
                loadTimetable();
            } else {
                msg.style.color = "var(--danger)";
                msg.innerText = "❌ " + (res.message || "Failed. Ensure you have subjects added.");
            }
            setTimeout(() => { msg.innerText = ""; }, 4000);
            btn.disabled = false;
        }

        loadTimetable();
    </script>
</body>

</html>
