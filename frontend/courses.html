<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subjects - StudyBuddy</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #4e73df;
            color: white;
            position: fixed;
            padding-top: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #2e59d9;
        }

        .logout {
            cursor: pointer;
        }

        .main {
            margin-left: 220px;
            padding: 24px;
        }

        h2 {
            color: #4e73df;
            margin-bottom: 20px;
        }

        /* ---- Add Subject Form ---- */
        .add-card {
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 28px;
        }

        .add-card h3 {
            color: #4e73df;
            margin: 0 0 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4e73df;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            background: #4e73df;
        }

        .btn:hover {
            background: #2e59d9;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .btn-red {
            background: #e74c3c;
        }

        .btn-red:hover {
            background: #c0392b;
        }

        .btn-green {
            background: #27ae60;
        }

        .btn-green:hover {
            background: #219a52;
        }

        #addMsg {
            margin-top: 10px;
            font-size: 13px;
            min-height: 16px;
        }

        /* ---- Subjects Grid ---- */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .subject-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .subject-header {
            padding: 18px 20px 14px;
            border-left: 5px solid #4e73df;
        }

        .subject-header h3 {
            margin: 0 0 6px;
            font-size: 17px;
            color: #222;
        }

        .subject-meta {
            font-size: 12px;
            color: #777;
            margin-bottom: 10px;
        }

        .subject-meta span {
            margin-right: 12px;
        }

        .diff-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            margin-right: 8px;
        }

        .diff-High {
            background: #e74c3c;
        }

        .diff-Medium {
            background: #f39c12;
        }

        .diff-Low {
            background: #27ae60;
        }

        .card-actions {
            padding: 10px 20px 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ---- Syllabus Panel ---- */
        .syllabus-panel {
            display: none;
            border-top: 1px solid #eee;
            padding: 16px 20px;
            background: #f9fbff;
        }

        .syllabus-panel h4 {
            margin: 0 0 12px;
            color: #4e73df;
            font-size: 14px;
        }

        .progress-bar-wrap {
            background: #e0e7ff;
            border-radius: 5px;
            height: 10px;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 10px;
            background: #4e73df;
            border-radius: 5px;
            transition: width 0.4s;
        }

        .progress-label {
            font-size: 12px;
            color: #555;
            margin-bottom: 12px;
        }

        .topic-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .topic-input-row input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
        }

        .topic-input-row input:focus {
            outline: none;
            border-color: #4e73df;
        }

        .topic-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .topic-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .topic-item.done span {
            text-decoration: line-through;
            color: #aaa;
        }

        .topic-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #4e73df;
        }

        .topic-del {
            margin-left: auto;
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 15px;
            padding: 0 4px;
        }

        .empty {
            color: #888;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>📚 StudyBuddy</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="timetable.html">📅 Timetable</a>
        <a href="session.html">⏱ Study Session</a>
        <a href="alarm.html">⏰ Alarm</a>
        <a href="progress.html">📊 Progress</a>
        <a href="courses.html" class="active">📚 My Subjects</a>
        <a href="weak.html">⚠️ Weak Areas</a>
        <a href="gamification.html">🎮 Gamification</a>
        <a href="ai_study.html">🤖 AI Assistant</a>
        <a href="settings.html">⚙️ Settings</a>
        <a class="logout" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="main">
        <h2>📚 My Subjects</h2>

        <!-- Add Subject Form -->
        <div class="add-card">
            <h3>➕ Add New Subject</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Subject Name *</label>
                    <input type="text" id="subName" placeholder="e.g. Physics">
                </div>
                <div class="form-group">
                    <label>Difficulty Level</label>
                    <select id="subDifficulty">
                        <option value="High">🔴 High</option>
                        <option value="Medium" selected>🟡 Medium</option>
                        <option value="Low">🟢 Low</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Frequency (slots/week)</label>
                    <input type="number" id="subFrequency" min="1" max="14" value="1" placeholder="e.g. 2">
                </div>
                <div class="form-group">
                    <label>Exam Date</label>
                    <input type="date" id="subExamDate">
                </div>
            </div>
            <div class="form-group">
                <label>Daily Study Goal (e.g. "2 hrs")</label>
                <input type="text" id="subGoal" placeholder="e.g. 2 hrs">
            </div>
            <button class="btn" onclick="addNewSubject()">➕ Add Subject</button>
            <div id="addMsg"></div>
        </div>

        <!-- Subjects Grid -->
        <div class="subjects-grid" id="subjectsGrid">
            <p class="empty">Loading subjects...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        requireAuth();

        // ========================
        // LOAD SUBJECTS
        // ========================
        async function loadSubjects() {
            const grid = document.getElementById("subjectsGrid");
            const subjects = await getSubjects();

            if (!Array.isArray(subjects) || subjects.length === 0) {
                grid.innerHTML = '<p class="empty">No subjects yet. Add your first subject above!</p>';
                return;
            }

            grid.innerHTML = subjects.map(s => buildSubjectCard(s)).join("");
        }

        function buildSubjectCard(s) {
            const examStr = s.exam_date
                ? `📅 Exam: <strong>${s.exam_date}</strong>`
                : `📅 No exam date`;
            const goalStr = s.study_goal
                ? `⏱ Goal: <strong>${s.study_goal}</strong>`
                : "";

            return `
            <div class="subject-card" id="card-${s.id}">
                <div class="subject-header">
                    <h3>
                        <span class="diff-badge diff-${s.difficulty}">${s.difficulty}</span>
                        ${s.name}
                    </h3>
                    <div class="subject-meta">
                        <span>🔁 Freq: <strong>${s.frequency}×</strong></span>
                        <span>${examStr}</span>
                        ${goalStr ? `<span>${goalStr}</span>` : ""}
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn btn-sm" onclick="toggleSyllabus(${s.id})">📖 Syllabus</button>
                    <button class="btn btn-sm btn-red" onclick="removeSubject(${s.id}, '${s.name}')">🗑 Delete</button>
                </div>
                <div class="syllabus-panel" id="syllabus-${s.id}">
                    <h4>📋 Syllabus Topics</h4>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-fill" id="prog-${s.id}" style="width:0%"></div>
                    </div>
                    <div class="progress-label" id="prog-label-${s.id}">0 / 0 topics done</div>
                    <div class="topic-input-row">
                        <input type="text" id="topicInput-${s.id}" placeholder="Add new topic..." onkeydown="if(event.key==='Enter') addNewTopic(${s.id})">
                        <button class="btn btn-sm btn-green" onclick="addNewTopic(${s.id})">Add</button>
                    </div>
                    <ul class="topic-list" id="topicList-${s.id}"></ul>
                </div>
            </div>`;
        }

        // ========================
        // ADD SUBJECT
        // ========================
        async function addNewSubject() {
            const name = document.getElementById("subName").value.trim();
            const difficulty = document.getElementById("subDifficulty").value;
            const frequency = parseInt(document.getElementById("subFrequency").value) || 1;
            const exam_date = document.getElementById("subExamDate").value;
            const study_goal = document.getElementById("subGoal").value.trim();
            const msg = document.getElementById("addMsg");

            if (!name) {
                msg.style.color = "red";
                msg.innerText = "Subject name is required.";
                return;
            }

            const res = await addSubject({ name, difficulty, frequency, exam_date: exam_date || null, study_goal });
            if (res._ok) {
                msg.style.color = "#27ae60";
                msg.innerText = `✅ "${name}" added!`;
                document.getElementById("subName").value = "";
                document.getElementById("subExamDate").value = "";
                document.getElementById("subGoal").value = "";
                document.getElementById("subFrequency").value = "1";
                await loadSubjects();
            } else {
                msg.style.color = "red";
                msg.innerText = "❌ " + (res.message || "Failed to add.");
            }
        }

        // ========================
        // DELETE SUBJECT
        // ========================
        async function removeSubject(id, name) {
            if (!confirm(`Delete subject "${name}" and all its syllabus topics?`)) return;
            const res = await deleteSubject(id);
            if (res._ok) {
                await loadSubjects();
            } else {
                alert("Failed to delete: " + (res.message || "error"));
            }
        }

        // ========================
        // SYLLABUS PANEL
        // ========================
        async function toggleSyllabus(subjectId) {
            const panel = document.getElementById(`syllabus-${subjectId}`);
            const isOpen = panel.style.display === "block";
            panel.style.display = isOpen ? "none" : "block";
            if (!isOpen) {
                await loadTopics(subjectId);
            }
        }

        async function loadTopics(subjectId) {
            const res = await getSyllabus(subjectId);
            if (!res._ok) return;

            const { topics, total, completed, percent } = res;

            document.getElementById(`prog-${subjectId}`).style.width = percent + "%";
            document.getElementById(`prog-label-${subjectId}`).innerText = `${completed} / ${total} topics completed (${percent}%)`;

            const list = document.getElementById(`topicList-${subjectId}`);
            if (!topics || topics.length === 0) {
                list.innerHTML = '<li style="color:#aaa;font-size:13px;padding:8px 0;">No topics yet. Add some above!</li>';
                return;
            }

            list.innerHTML = topics.map(t => `
                <li class="topic-item ${t.completed ? 'done' : ''}" id="topic-li-${t.id}">
                    <input type="checkbox" class="topic-checkbox" ${t.completed ? 'checked' : ''}
                        onchange="toggleTopicCheck(${t.id}, ${subjectId})">
                    <span>${t.topic_name}</span>
                    <button class="topic-del" onclick="removeTopicItem(${t.id}, ${subjectId})" title="Delete">✕</button>
                </li>`).join("");
        }

        async function addNewTopic(subjectId) {
            const input = document.getElementById(`topicInput-${subjectId}`);
            const name = input.value.trim();
            if (!name) return;

            const res = await addTopic(subjectId, name);
            if (res._ok) {
                input.value = "";
                await loadTopics(subjectId);
            } else {
                alert("Failed: " + (res.message || "error"));
            }
        }

        async function toggleTopicCheck(topicId, subjectId) {
            await toggleTopic(topicId);
            await loadTopics(subjectId);
        }

        async function removeTopicItem(topicId, subjectId) {
            await deleteTopic(topicId);
            await loadTopics(subjectId);
        }

        loadSubjects();
    </script>
</body>

</html>
