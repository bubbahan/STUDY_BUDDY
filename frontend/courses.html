<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - StudyBuddy</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #4e73df;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #2e59d9;
        }

        .logout {
            cursor: pointer;
        }

        .main {
            margin-left: 220px;
            padding: 24px;
        }

        h2 {
            color: #4e73df;
            margin-bottom: 20px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .course-card h3 {
            margin: 0 0 6px;
            color: #222;
        }

        .level-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: white;
            margin-bottom: 10px;
        }

        .level-1 {
            background: #28a745;
        }

        .level-2 {
            background: #ffc107;
            color: #333;
        }

        .level-3 {
            background: #dc3545;
        }

        .progress-bar-wrap {
            background: #eee;
            border-radius: 5px;
            height: 8px;
            margin: 10px 0;
        }

        .progress-bar-fill {
            height: 8px;
            background: #4e73df;
            border-radius: 5px;
            transition: width 0.4s;
        }

        .progress-label {
            font-size: 12px;
            color: #666;
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn:hover {
            background: #2e59d9;
        }

        .btn-enrolled {
            background: #6c757d;
        }

        .btn-enrolled:hover {
            background: #5a6268;
        }

        .btn-completed {
            background: #28a745;
            cursor: default;
        }

        .empty {
            color: #888;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>📚 StudyBuddy</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="timetable.html">📅 Timetable</a>
        <a href="session.html">⏱ Study Session</a>
        <a href="alarm.html">⏰ Alarm</a>
        <a href="progress.html">📊 Progress</a>
        <a href="courses.html" class="active">📚 Courses</a>
        <a href="weak.html">⚠️ Weak Areas</a>
        <a href="gamification.html">🎮 Gamification</a>
        <a href="settings.html">⚙️ Settings</a>
        <a class="logout" onclick="logout()">🚪 Logout</a>
    </div>

    <div class="main">
        <h2>📚 Available Courses</h2>
        <div class="courses-grid" id="coursesGrid">
            <p class="empty">Loading courses...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        requireAuth();

        async function loadCourses() {
            const courses = await getCourses();
            const grid = document.getElementById("coursesGrid");

            if (!Array.isArray(courses) || courses.length === 0) {
                grid.innerHTML = '<p class="empty">No courses available yet.</p>';
                return;
            }

            grid.innerHTML = courses.map(c => {
                const pct = c.total_units > 0
                    ? Math.round((c.progress_units / c.total_units) * 100)
                    : 0;

                let btnHtml;
                if (c.completed) {
                    btnHtml = `<button class="btn btn-completed" disabled>✅ Completed</button>`;
                } else if (c.enrolled) {
                    btnHtml = `<button class="btn btn-enrolled" disabled>📖 Enrolled (${pct}%)</button>`;
                } else {
                    btnHtml = `<button class="btn" onclick="enroll(${c.id}, this)">Enroll</button>`;
                }

                const levelLabel = c.level === 1 ? "Beginner" : c.level === 2 ? "Intermediate" : "Advanced";

                return `
            <div class="course-card">
                <h3>${c.title}</h3>
                <span class="level-badge level-${c.level}">${levelLabel}</span>
                <p style="font-size:13px; color:#555; margin:6px 0;">
                    ${c.total_units} units · ${c.required_hours} hrs required
                </p>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" style="width:${pct}%"></div>
                </div>
                <p class="progress-label">${c.progress_units} / ${c.total_units} units</p>
                ${btnHtml}
            </div>`;
            }).join("");
        }

        async function enroll(courseId, btn) {
            btn.disabled = true;
            btn.innerText = "Enrolling...";
            const res = await enrollCourse(courseId);
            if (res._ok) {
                btn.innerText = "📖 Enrolled";
                btn.className = "btn btn-enrolled";
            } else {
                btn.innerText = res.message || "Error";
                btn.disabled = false;
            }
        }

        loadCourses();
    </script>

</body>

</html>
